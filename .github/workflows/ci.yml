name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mnx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Test backend
        run: npm run test:server
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/mnx_test
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: Test coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/mnx_test
          JWT_SECRET: test-secret
          NODE_ENV: test
